<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموسوعة الطبية الشاملة | طبيب عربي</title>
    <meta name="description" content="الدليل الطبي الشامل لجميع الأمراض، الأعراض، التشخيص، وبروتوكولات العلاج الحديثة.">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #005f92;
            --accent-color: #ffc107;
            --bg-color: #f8fafc;
            --text-color: #334155;
        }

        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); color: var(--text-color); }

        /* الهيدر والبحث */
        .encyclopedia-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white; padding: 60px 0; margin-bottom: 0; /* تم إزالة الهامش السفلي ليلتصق بشريط الأقسام */
            border-bottom: 5px solid var(--accent-color);
        }
        .search-box { position: relative; max-width: 600px; margin: 0 auto; transform: translateY(20px); }
        .search-box input {
            width: 100%; padding: 20px 25px; padding-right: 55px; font-size: 1.1rem;
            border-radius: 50px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.15); font-weight: 600;
        }
        .search-box input:focus { outline: none; box-shadow: 0 10px 30px rgba(13, 110, 253, 0.3); }
        .search-box i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--primary-color); font-size: 1.5rem; }

        /* البطاقات الذكية (Cards) */
        .disease-card-ui { transition: transform 0.3s, box-shadow 0.3s; border-radius: 15px; border: 1px solid #e2e8f0; }
        .disease-card-ui:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important; border-color: #cbd5e1; }
        .line-clamp { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* شريط التخصصات العلوي القابل للتمرير (الجديد) */
        .specialty-tabs-container {
            background-color: white;
            padding: 15px 0;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 75px; /* يثبت تحت الـ Navbar عند النزول */
            z-index: 1020;
        }

        .specialty-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none; /* إخفاء شريط التمرير في فايرفوكس */
            -ms-overflow-style: none; /* إخفاء شريط التمرير في IE */
            padding-bottom: 5px;
        }
        
        .specialty-tabs::-webkit-scrollbar {
            display: none; /* إخفاء شريط التمرير في كروم وسفاري */
        }

        .tab-btn {
            background-color: #f1f5f9;
            color: var(--text-color);
            border: 1px solid #cbd5e1;
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: 700;
            font-size: 0.95rem;
            white-space: nowrap; /* يمنع نزول النص لسطرين */
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            background-color: #e2e8f0;
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top" style="background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); box-shadow: 0 4px 30px rgba(0,0,0,0.05); z-index: 1030;">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="appicon.jpg" alt="طبيب عربي" width="45" height="45" class="d-inline-block align-text-top rounded-circle" onerror="this.src='https://via.placeholder.com/45'">
                <span class="fw-bold text-primary" style="font-size: 1.3rem;">طبيب عربي</span>
            </a>
            <div>
                <a href="index.html" class="btn btn-outline-primary rounded-pill fw-bold px-4 shadow-sm d-none d-md-inline-block">
                    <i class="fas fa-search me-1"></i> ابحث عن طبيب
                </a>
                <a href="index.html" class="btn btn-primary rounded-circle shadow-sm d-md-none" style="width: 45px; height: 45px; line-height: 33px; text-align: center;">
                    <i class="fas fa-home"></i>
                </a>
            </div>
        </div>
    </nav>

    <header class="encyclopedia-header text-center">
        <div class="container">
            <h1 class="display-5 fw-bolder mb-3">الموسوعة الطبية | طبيب عربي</h1>
            <p class="lead mb-4">مرجعك الشامل للأمراض، الأعراض، وبروتوكولات العلاج الحديثة</p>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="diseaseSearch" placeholder="ابحث عن مرض أو تخصص..." onkeyup="filterDiseases()">
            </div>
        </div>
    </header>

    <div class="specialty-tabs-container">
        <div class="container">
            <div class="specialty-tabs" id="categoryTabs">
                <button class="tab-btn active" onclick="filterByCategory('all', this)"><i class="fas fa-layer-group"></i> جميع الأمراض</button>
                <button class="tab-btn" onclick="filterByCategory('firstaid', this)"><i class="fas fa-medkit"></i> إسعافات وطوارئ</button>
                <button class="tab-btn" onclick="filterByCategory('internal', this)"><i class="fas fa-heartbeat"></i> باطنة وقلب</button>
                <button class="tab-btn" onclick="filterByCategory('gastro', this)"><i class="fas fa-stomach"></i> جهاز هضمي</button>
                <button class="tab-btn" onclick="filterByCategory('pedia', this)"><i class="fas fa-child"></i> طب الأطفال</button>
                <button class="tab-btn" onclick="filterByCategory('obgyn', this)"><i class="fas fa-baby"></i> نساء وتوليد</button>
                <button class="tab-btn" onclick="filterByCategory('ortho', this)"><i class="fas fa-bone"></i> عظام ومفاصل</button>
                <button class="tab-btn" onclick="filterByCategory('neuro', this)"><i class="fas fa-brain"></i> مخ وأعصاب</button>
                <button class="tab-btn" onclick="filterByCategory('derma', this)"><i class="fas fa-spa"></i> جلدية وتجميل</button>
                <button class="tab-btn" onclick="filterByCategory('uro', this)"><i class="fas fa-procedures"></i> مسالك بولية</button>
                <button class="tab-btn" onclick="filterByCategory('ophtha', this)"><i class="fas fa-eye"></i> رمد وعيون</button>
                <button class="tab-btn" onclick="filterByCategory('ent', this)"><i class="fas fa-ear-deaf"></i> أنف وأذن</button>
                <button class="tab-btn" onclick="filterByCategory('psych', this)"><i class="fas fa-user-md"></i> طب نفسي</button>
            </div>
        </div>
    </div>

    <div class="container mb-5">
        <div id="noResults" style="display: none; text-align: center; padding: 50px; color: #64748b;">
            <i class="fas fa-search-minus fa-3x mb-3 text-muted"></i>
            <h4 class="fw-bold">لم يتم العثور على نتائج تطابق بحثك</h4>
            <p>حاول البحث بكلمات أخرى أو تصفح الأقسام من الشريط العلوي.</p>
        </div>
        
        <div class="row" id="diseases-container"></div>
    </div>

    <footer class="text-center py-5 bg-dark text-secondary mt-5 border-top border-primary border-4">
        <div class="container">
            <div class="mb-4">
                <a href="index.html" class="text-light text-decoration-none fs-4 fw-bold d-flex justify-content-center align-items-center gap-2">
                    <img src="appicon.jpg" width="30" height="30" class="rounded-circle" onerror="this.src='https://via.placeholder.com/30'">
                    طبيب عربي
                </a>
            </div>
            <p class="mb-0 mt-2 small text-light">&copy; 2026 دليل طبيب عربي. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script src="diseases-data.js"></script>

    <script>
        const container = document.getElementById('diseases-container');

        // 1. دالة بناء البطاقات من ملف diseases-data.js
        function renderCards() {
            container.innerHTML = '';
            // المرور على كل مرض في قاعدة البيانات
            for (const [id, data] of Object.entries(diseasesDB)) {
                // استخدام col-md-4 أو col-lg-4 لجعلها 3 بطاقات في الصف الواحد (لأن المساحة كبرت)
                const cardHTML = `
                    <div class="col-md-6 col-lg-4 mb-4 disease-card" data-category="${data.categoryId}">
                        <div class="card h-100 shadow-sm bg-white disease-card-ui">
                            <div class="card-body">
                                <span class="badge ${data.badgeClass} mb-3 px-3 py-2">${data.category}</span>
                                <h4 class="card-title fw-bold" style="color: #0f172a; font-size: 1.2rem;">${data.title}</h4>
                                <p class="card-text text-muted line-clamp" style="font-size: 0.95rem;">${data.overview}</p>
                            </div>
                            <div class="card-footer bg-transparent border-0 pb-4 pt-0 text-center">
                                <a href="disease.html?id=${id}" class="btn btn-outline-primary w-100 rounded-pill fw-bold">
                                    <i class="fas fa-book-medical me-1"></i> اقرأ الملف الكامل
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            }
        }

        // تشغيل بناء البطاقات عند فتح الصفحة
        renderCards();

        // 2. دالة البحث النصي
        function filterDiseases() {
            let input = document.getElementById('diseaseSearch').value.toLowerCase();
            let cards = document.querySelectorAll('.disease-card');
            let hasResults = false;

            // إرجاع تفعيل زر "الكل" عند البحث
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.tab-btn').classList.add('active');

            cards.forEach(card => {
                let title = card.querySelector('.card-title').innerText.toLowerCase();
                let desc = card.querySelector('.card-text').innerText.toLowerCase();
                if (title.includes(input) || desc.includes(input)) {
                    card.style.display = "block";
                    hasResults = true;
                } else {
                    card.style.display = "none";
                }
            });

            document.getElementById('noResults').style.display = hasResults ? "none" : "block";
        }

        // 3. دالة الفلترة الجانبية المحسنة للشريط العلوي
        function filterByCategory(category, clickedButton) {
            if (window.event) window.event.preventDefault();
            
            // إفراغ مربع البحث
            document.getElementById('diseaseSearch').value = '';
            document.getElementById('noResults').style.display = "none";

            // إظهار وإخفاء البطاقات حسب القسم
            let cards = document.querySelectorAll('.disease-card');
            cards.forEach(card => {
                if (category === 'all' || card.getAttribute('data-category') === category) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });

            // إزالة اللون من كل الأزرار ووضعه على الزر المضغوط فقط
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (clickedButton) {
                clickedButton.classList.add('active');
                
                // تمرير الشريط العلوي أوتوماتيكياً ليصبح الزر المضغوط في المنتصف (للهواتف)
                clickedButton.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }

            // تمرير الشاشة قليلاً للأعلى لرؤية البطاقات (تعديل المسافة لتناسب الشريط الجديد)
            const containerNode = document.getElementById('diseases-container');
            if (containerNode) {
                const yOffset = -130; 
                const y = containerNode.getBoundingClientRect().top + window.pageYOffset + yOffset;
                window.scrollTo({ top: y, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
