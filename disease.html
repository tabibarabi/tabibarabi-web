<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل... | طبيب عربي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #005f92;
            --accent-color: #ffc107;
            --bg-color: #f8fafc;
            --text-color: #334155;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* شريط التنقل */
        .navbar-brand img { border-radius: 50%; border: 2px solid var(--primary-color); }
        .nav-link-custom { font-weight: 700; color: var(--text-color); transition: 0.3s; }
        .nav-link-custom:hover { color: var(--primary-color); }

        /* الهيدر الجديد */
        .disease-header { 
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); 
            color: white; 
            padding: 80px 0 60px; 
            margin-bottom: 0;
            border-bottom: 5px solid var(--accent-color);
            position: relative;
        }

        /* حاوية المحتوى */
        .disease-container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.05); 
            margin-top: -40px; /* تداخل أنيق مع الهيدر */
            position: relative;
            z-index: 10;
        }

        .med-section-title { 
            color: var(--secondary-color); 
            font-weight: 800; 
            margin-top: 35px; 
            margin-bottom: 20px; 
            padding-bottom: 10px;
            border-bottom: 2px solid #eff2f7;
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }

        .med-text { line-height: 1.9; font-size: 1.15rem; color: #475569; text-align: justify; }
        .med-list li { margin-bottom: 12px; }

        /* صندوق الأدوية المميز */
        .pharma-box { 
            background: #f0fdf4; 
            border-right: 6px solid #22c55e; 
            padding: 30px; 
            border-radius: 15px; 
            margin-top: 40px;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.05);
        }

        /* الفوتر الاحترافي */
        footer { background-color: #0f172a; color: #94a3b8; padding: 60px 0 30px; margin-top: auto; }
        .footer-brand { color: white; font-weight: 800; font-size: 1.5rem; margin-bottom: 20px; display: block; text-decoration: none; }
        .social-links a { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            width: 45px; 
            height: 45px; 
            background: #1e293b; 
            color: white; 
            border-radius: 50%; 
            margin: 0 5px; 
            transition: 0.3s; 
            text-decoration: none;
        }
        .social-links a:hover { background: var(--primary-color); transform: translateY(-3px); }
        .footer-links { list-style: none; padding: 0; display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .footer-links a { color: #cbd5e1; text-decoration: none; font-weight: 600; }
        .footer-links a:hover { color: white; }

        @media (max-width: 768px) {
            .disease-container { padding: 25px; margin-top: -30px; border-radius: 15px; }
            .disease-header { padding: 60px 0 50px; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top bg-white shadow-sm py-2">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="appicon.jpg" alt="طبيب عربي" width="40" height="40" onerror="this.src='https://via.placeholder.com/40'">
                <span class="fw-bold text-primary">طبيب عربي</span>
            </a>
            <div class="d-flex gap-2">
                <a href="articles.html" class="btn btn-light btn-sm fw-bold border text-secondary px-3 rounded-pill d-none d-md-block">
                    <i class="fas fa-book-medical me-1"></i> الموسوعة
                </a>
                <a href="index.html" class="btn btn-primary btn-sm fw-bold px-3 rounded-pill shadow-sm">
                    <i class="fas fa-home me-1"></i> الرئيسية
                </a>
            </div>
        </div>
    </nav>

    <header class="disease-header text-center">
        <div class="container">
            <span id="page-badge" class="badge mb-3 px-4 py-2 fs-6 shadow-sm">جاري التحميل...</span>
            <h1 id="page-title" class="display-5 fw-bolder">...</h1>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-xl-9">
                <article class="disease-container">
                    <div class="d-flex align-items-start gap-3 border-bottom pb-4 mb-4">
                        <div class="bg-primary bg-opacity-10 p-3 rounded-circle text-primary d-none d-sm-block">
                            <i class="fas fa-info-circle fa-2x"></i>
                        </div>
                        <p id="page-overview" class="med-text fw-bold m-0"></p>
                    </div>
                    
                    <div id="page-content">
                        </div>

                    <section class="pharma-box">
                        <h5 id="page-pharma-title" style="color: #166534; font-weight: 900; margin-bottom: 20px;"></h5>
                        <div id="page-pharma-content" class="med-text">
                            </div>
                    </section>
                </article>
            </div>
        </div>
    </main>

    <footer>
        <div class="container text-center">
            <a href="index.html" class="footer-brand">
                <img src="appicon.jpg" width="50" height="50" class="rounded-circle me-2 border border-light" onerror="this.src='https://via.placeholder.com/50'">
                طبيب عربي
            </a>
            <p class="mb-4">دليلك الطبي الأول لنتائج بحث موثوقة برؤية عربية.</p>
            
            <div class="social-links mb-4">
                <a href="https://www.facebook.com/share/12K7f2P77L/?mibextid=wwXIfr" target="_blank" title="فيسبوك"><i class="fab fa-facebook-f"></i></a>
                <a href="https://wa.me/201026485012" target="_blank" title="واتساب"><i class="fab fa-whatsapp"></i></a>
                <a href="index.html" title="الموقع الرسمي"><i class="fas fa-globe"></i></a>
            </div>

            <ul class="footer-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="articles.html">الموسوعة الطبية</a></li>
                <li><a href="#">عن طبيب عربي</a></li>
            </ul>

            <hr class="my-4 border-secondary opacity-25">
            <p class="small mb-0">&copy; 2026 دليل طبيب عربي. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script src="diseases-data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const diseaseId = urlParams.get('id');

        if (diseaseId && diseasesDB[diseaseId]) {
            const data = diseasesDB[diseaseId];
            
            // حقن البيانات
            document.title = data.title + " | طبيب عربي";
            document.getElementById('page-title').innerText = data.title;
            
            const badge = document.getElementById('page-badge');
            badge.innerText = data.category;
            badge.className = "badge mb-3 px-4 py-2 fs-6 " + data.badgeClass;
            
            document.getElementById('page-overview').innerHTML = data.overview;
            document.getElementById('page-content').innerHTML = data.content;
            document.getElementById('page-pharma-title').innerHTML = '<i class="fas fa-pills me-2"></i>' + data.pharmaTitle;
            document.getElementById('page-pharma-content').innerHTML = data.pharmaContent;
        } else {
            document.getElementById('page-title').innerText = "عذراً، لم يتم العثور على المقال";
            document.getElementById('page-badge').style.display = 'none';
            document.getElementById('page-overview').innerText = "قد يكون الرابط غير صحيح أو تم نقل المقال.";
            document.querySelector('.pharma-box').style.display = 'none';
        }
    </script>
</body>
</html>
